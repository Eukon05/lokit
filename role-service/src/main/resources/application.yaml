spring:
  application:
    name: role-service
  datasource:
    username: ${LOKIT_ROLE_DB_USERNAME}
    password: ${LOKIT_ROLE_DB_PASSWORD}
    url: ${LOKIT_ROLE_DB_URL}
  jpa:
    hibernate:
      ddl-auto: create-drop

  h2:
    console:
      enabled: true
      path: /h2-console

  rabbitmq:
    username: ${LOKIT_RABBITMQ_USERNAME}
    password: ${LOKIT_RABBITMQ_PASSWORD}
    host: ${LOKIT_RABBITMQ_HOST}
    port: ${LOKIT_RABBITMQ_PORT}

  grpc:
    server:
      port: ${LOKIT_ROLE_GRPC_PORT}
      ssl:
        enabled: true
        client-auth: require
        bundle: lokit-role-server-ssl

    client:
      channel:
        identity-service:
          target: ${LOKIT_IDENTITY_GRPC_TARGET}
          ssl:
            enabled: true
            bundle: lokit-role-client-ssl

  ssl:
    bundle:
      jks:
        lokit-role-server-ssl:
          keystore.location: classpath:role-server-keystore.p12
          keystore.password: ${LOKIT_ROLE_TLS_SERVER_KEYSTORE_PASSWORD}
          keystore.type: PKCS12
          truststore.location: classpath:role-server-truststore.p12
          truststore.password: ${LOKIT_ROLE_TLS_SERVER_TRUSTSTORE_PASSWORD}
          truststore.type: PKCS12
        lokit-role-client-ssl:
          keystore.location: classpath:role-client-keystore.p12
          keystore.password: ${LOKIT_ROLE_TLS_CLIENT_KEYSTORE_PASSWORD}
          keystore.type: PKCS12
          truststore.location: classpath:role-client-truststore.p12
          truststore.password: ${LOKIT_ROLE_TLS_CLIENT_TRUSTSTORE_PASSWORD}
          truststore.type: PKCS12

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${LOKIT_OAUTH_ISSUER_URI}
          jwk-set-uri: ${LOKIT_OAUTH_JWK_URI}

server:
  port: ${LOKIT_ROLE_PORT}

lokit:
  jwt:
    role-claims: ${LOKIT_JWT_ROLE_CLAIMS}
