spring:
  application:
    name: role-service
  datasource:
    username: sa
    password: password
    url: jdbc:h2:mem:testdb
  jpa:
    hibernate:
      ddl-auto: create-drop

  h2:
    console:
      enabled: true
      path: /h2-console

  rabbitmq:
    username: user
    password: password
    host: localhost
    port: 5672

  grpc:
    server:
      port: 9090
      ssl:
        enabled: true
        client-auth: require
        bundle: lokit-role-server-ssl

  ssl:
    bundle:
      jks:
        lokit-role-server-ssl:
          keystore.location: classpath:role-server-keystore.p12
          keystore.password: changeit
          keystore.type: PKCS12
          truststore.location: classpath:role-server-truststore.p12
          truststore.password: changeit
          truststore.type: PKCS12

server:
  port: 8080