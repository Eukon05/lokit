spring:
  application:
    name: room-service

  datasource:
    username: sa
    password: password
    url: jdbc:h2:mem:testdb
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
      path: /h2-console

  grpc:
    client:
      channel:
        role-service:
          target: 0.0.0.0:9090
    server:
      port: 9091

  rabbitmq:
    username: user
    password: password
    host: localhost
    port: 5672

server:
  port: 8081