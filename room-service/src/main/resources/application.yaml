spring:
  application:
    name: room-service

  datasource:
    username: ${LOKIT_ROOM_DB_USERNAME}
    password: ${LOKIT_ROOM_DB_PASSWORD}
    url: ${LOKIT_ROOM_DB_URL}
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
      path: /h2-console

  grpc:
    client:
      channel:
        role-service:
          target: ${LOKIT_ROLE_GRPC_TARGET}
          ssl:
            enabled: true
            bundle: lokit-room-client-ssl
    server:
      port: ${LOKIT_ROOM_GRPC_PORT}
      ssl:
        enabled: true
        client-auth: require
        bundle: lokit-room-server-ssl

  ssl:
    bundle:
      jks:
        lokit-room-server-ssl:
          keystore.location: classpath:room-server-keystore.p12
          keystore.password: ${LOKIT_ROOM_TLS_SERVER_KEYSTORE_PASSWORD}
          keystore.type: PKCS12
          truststore.location: classpath:room-server-truststore.p12
          truststore.password: ${LOKIT_ROOM_TLS_SERVER_TRUSTSTORE_PASSWORD}
          truststore.type: PKCS12
        lokit-room-client-ssl:
          keystore.location: classpath:room-client-keystore.p12
          keystore.password: ${LOKIT_ROOM_TLS_CLIENT_KEYSTORE_PASSWORD}
          keystore.type: PKCS12
          truststore.location: classpath:room-client-truststore.p12
          truststore.password: ${LOKIT_ROOM_TLS_CLIENT_TRUSTSTORE_PASSWORD}
          truststore.type: PKCS12

  rabbitmq:
    username: ${LOKIT_RABBITMQ_USERNAME}
    password: ${LOKIT_RABBITMQ_PASSWORD}
    host: ${LOKIT_RABBITMQ_HOST}
    port: ${LOKIT_RABBITMQ_PORT}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${LOKIT_OAUTH_ISSUER_URI}
          jwk-set-uri: ${LOKIT_OAUTH_JWK_URI}

eureka:
  client:
    service-url:
      defaultZone: ${LOKIT_EUREKA_HOST}:${LOKIT_EUREKA_PORT}/eureka
  instance:
    prefer-ip-address: true
    metadata-map:
      grpc_port: ${spring.grpc.server.port}

server:
  port: ${LOKIT_ROOM_PORT}

lokit:
  jwt:
    role-claims: ${LOKIT_JWT_ROLE_CLAIMS}
