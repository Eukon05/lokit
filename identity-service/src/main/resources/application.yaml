spring:
  application:
    name: identity-service

  datasource:
    username: ${LOKIT_IDENTITY_DB_USERNAME}
    password: ${LOKIT_IDENTITY_DB_PASSWORD}
    url: ${LOKIT_IDENTITY_DB_URL}
  jpa:
    hibernate:
      ddl-auto: create-drop

  h2:
    console:
      enabled: true
      path: /h2-console

  grpc:
    server:
      port: ${LOKIT_IDENTITY_GRPC_PORT}
      ssl:
        enabled: true
        client-auth: require
        bundle: lokit-identity-server-ssl

  ssl:
    bundle:
      jks:
        lokit-identity-server-ssl:
          keystore.location: classpath:identity-server-keystore.p12
          keystore.password: ${LOKIT_IDENTITY_TLS_SERVER_KEYSTORE_PASSWORD}
          keystore.type: PKCS12
          truststore.location: classpath:identity-server-truststore.p12
          truststore.password: ${LOKIT_IDENTITY_TLS_SERVER_TRUSTSTORE_PASSWORD}
          truststore.type: PKCS12

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${LOKIT_OAUTH_ISSUER_URI}
          jwk-set-uri: ${LOKIT_OAUTH_JWK_URI}

eureka:
  client:
    service-url:
      defaultZone: ${LOKIT_EUREKA_HOST}:${LOKIT_EUREKA_PORT}/eureka
  instance:
    prefer-ip-address: true
    metadata-map:
      grpc_port: ${spring.grpc.server.port}

server:
  port: ${LOKIT_IDENTITY_PORT}

lokit:
  jwt:
    role-claims: ${LOKIT_JWT_ROLE_CLAIMS}
  keycloak:
    server-url: ${LOKIT_KEYCLOAK_URL}
    realm: ${LOKIT_KEYCLOAK_REALM}
    client-id: ${LOKIT_KEYCLOAK_CLIENT_ID}
    client-secret: ${LOKIT_KEYCLOAK_CLIENT_SECRET}
