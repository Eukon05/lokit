syntax = "proto3";

import "google/protobuf/empty.proto";

option java_multiple_files = true;
option java_package = "ovh.eukon05.lokit.common.proto";
option java_outer_classname = "RoomServiceProto";

message GetRoomReply {
  string roomId = 1;
  repeated string roleIds = 2;
}

service RoomService {
  rpc ListActiveRooms(google.protobuf.Empty) returns (stream GetRoomReply) {}
}
