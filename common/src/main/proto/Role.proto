syntax = "proto3";

import "google/protobuf/empty.proto";

option java_multiple_files = true;
option java_package = "ovh.eukon05.lokit.common.proto";
option java_outer_classname = "RoleServiceProto";

message CheckRoleExistsRequest {
  string roleId = 1;
}

message CheckRoleExistsReply {
  bool exists = 1;
}

message GetRoleReply {
  string roleId = 1;
}

service RoleService {
  rpc CheckRoleExists(CheckRoleExistsRequest) returns (CheckRoleExistsReply) {}
  rpc ListActiveRoles(google.protobuf.Empty) returns (stream GetRoleReply) {}
}
