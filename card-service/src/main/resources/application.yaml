spring:
  application:
    name: card-service

  datasource:
    username: sa
    password: password
    url: jdbc:h2:mem:testdb
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
      path: /h2-console

  rabbitmq:
    username: user
    password: password
    host: localhost
    port: 5672

  grpc:
    server:
      port: 9092
      ssl:
        enabled: true
        client-auth: require
        bundle: lokit-card-server-ssl
    client:
      channel:
        identity-service:
          target: static://localhost:9095
          ssl:
            enabled: true
            bundle: lokit-card-client-ssl

  ssl:
    bundle:
      jks:
        lokit-card-server-ssl:
          keystore.location: classpath:card-server-keystore.p12
          keystore.password: changeit
          keystore.type: PKCS12
          truststore.location: classpath:card-server-truststore.p12
          truststore.password: changeit
          truststore.type: PKCS12
        lokit-card-client-ssl:
          keystore.location: classpath:card-client-keystore.p12
          keystore.password: changeit
          keystore.type: PKCS12
          truststore.location: classpath:card-client-truststore.p12
          truststore.password: changeit
          truststore.type: PKCS12

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8090/realms/lokit
          jwk-set-uri: http://localhost:8090/realms/lokit/protocol/openid-connect/certs

server:
  port: 8082
